* { box-sizing: border-box; margin: 0; padding: 0; }

.layout { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: start; }
.desc-panel { padding: 0; }
.desc-panel h3 { font-size: 14px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 8px; }

.stars { display: flex; gap: 3px; padding: 8px 16px; }

const navEl = document.getElementById('nav');
const screensEl = document.getElementById('screens');

screens.forEach((s, i) => {
  const btn = document.createElement('button');
  btn.textContent = s.label;
  btn.className = i === 0 ? 'active' : '';
  btn.onclick = () => {
    document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.screen').forEach(sc => sc.classList.remove('visible'));
    document.getElementById('screen-' + s.id).classList.add('visible');
  };
  navEl.appendChild(btn);

  const stepsHtml = s.flow.map((f, j) =>
    `<div class="flow-step"><div class="flow-num">${j+1}</div><div class="flow-text">${f}</div></div>`
  ).join('');

  const div = document.createElement('div');
  div.className = 'screen' + (i === 0 ? ' visible' : '');
  div.id = 'screen-' + s.id;
  div.innerHTML = `
    <div class="layout">
      <div>${s.html}</div>
      <div class="desc-panel">
        <h3>${s.label}</h3>
        <p>${s.desc}</p>
        <div>${stepsHtml}</div>
      </div>
    </div>
  `;
  screensEl.appendChild(div);
});
</script>
